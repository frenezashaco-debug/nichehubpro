name: Daily Article Publisher

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic json-repair Pillow requests urllib3

      - name: Create config.py from secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          MAKE_PINTEREST_WEBHOOK: ${{ secrets.MAKE_PINTEREST_WEBHOOK }}
        run: |
          printf 'ANTHROPIC_API_KEY = "%s"\n' "$ANTHROPIC_API_KEY" > config.py
          printf 'HF_API_KEY = "%s"\n' "$HF_API_KEY" >> config.py
          printf 'PINTEREST_ACCESS_TOKEN = "%s"\n' "$PINTEREST_ACCESS_TOKEN" >> config.py
          printf 'MAKE_PINTEREST_WEBHOOK = "%s"\n' "$MAKE_PINTEREST_WEBHOOK" >> config.py
          printf 'OPENAI_API_KEY = ""\n' >> config.py
          python3 -c "import config; print('HF key OK:', bool(config.HF_API_KEY)); print('Anthropic key OK:', bool(config.ANTHROPIC_API_KEY))"

      - name: Show current publish status
        run: python batch_12weeks.py --status

      - name: Run batch publisher
        run: python batch_12weeks.py

      - name: Fix cover images
        continue-on-error: true
        timeout-minutes: 20
        run: python auto_fix_covers.py

      - name: Fix missing section images
        continue-on-error: true
        timeout-minutes: 15
        run: python fix_section_images.py

      - name: Commit and push
        run: |
          git config user.name "NicheHubPro Bot"
          git config user.email "bot@nichehubpro.com"
          git add articles/ images/ articles.js api/articles.json sitemap.xml
          git diff --staged --quiet && echo "Nothing new to commit" || (
            git commit -m "Auto-publish: daily article $(date +'%Y-%m-%d')" &&
            git pull --rebase origin main &&
            git push ||
            (echo "Push failed, retrying in 15s..." && sleep 15 && git pull --rebase origin main && git push) ||
            (echo "Push failed again, retrying in 30s..." && sleep 30 && git pull --rebase origin main && git push)
          )

      - name: Ping search engines
        continue-on-error: true
        run: python ping_indexing.py --new-only

      - name: Push Pinterest pins
        continue-on-error: true
        run: |
          sleep 30
          python auto_pins.py

      - name: Purge Cloudflare cache
        continue-on-error: true
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "CF secrets not set — skipping cache purge."
            exit 0
          fi
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print('Cache purged OK' if r.get('success') else f'Purge failed: {r}')"
