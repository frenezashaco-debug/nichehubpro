name: Daily Article Publisher

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic json_repair Pillow requests huggingface_hub

      - name: Verify API key is set
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is not set!"
            exit 1
          fi
          echo "API key is present (length: ${#ANTHROPIC_API_KEY})"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create config.py from secret
        run: echo "ANTHROPIC_API_KEY = \"${{ secrets.ANTHROPIC_API_KEY }}\"" > config.py

      - name: Show current publish status
        run: python batch_30days.py --status

      - name: Run batch publisher
        run: python batch_30days.py

      - name: Commit and push
        run: |
          git config user.name "NicheHubPro Bot"
          git config user.email "bot@nichehubpro.com"
          git add articles/ images/ articles.js sitemap.xml
          git diff --staged --quiet && echo "Nothing new to commit" || (git commit -m "Auto-publish: daily article $(date +'%Y-%m-%d')" && git push)
