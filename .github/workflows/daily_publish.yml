name: Daily Article Publisher

on:
  schedule:
    - cron: '0 8 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic json_repair Pillow requests huggingface_hub

      - name: Verify API key is set
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is not set!"
            exit 1
          fi
          echo "API key is present (length: ${#ANTHROPIC_API_KEY})"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create config.py from secret
        run: |
          cat > config.py << 'EOF'
          ANTHROPIC_API_KEY = "${{ secrets.ANTHROPIC_API_KEY }}"
          HF_API_KEY = "${{ secrets.HF_API_KEY }}"
          PINTEREST_ACCESS_TOKEN = "${{ secrets.PINTEREST_ACCESS_TOKEN }}"
          MAKE_PINTEREST_WEBHOOK = "${{ secrets.MAKE_PINTEREST_WEBHOOK }}"
          OPENAI_API_KEY = ""
          EOF

      - name: Show current publish status
        run: python batch_12weeks.py --status

      - name: Run batch publisher
        run: python batch_12weeks.py

      - name: Commit and push
        run: |
          git config user.name "NicheHubPro Bot"
          git config user.email "bot@nichehubpro.com"
          git add articles/ images/ articles.js sitemap.xml
          git diff --staged --quiet && echo "Nothing new to commit" || (git commit -m "Auto-publish: daily article $(date +'%Y-%m-%d')" && git push)

      - name: Push Pinterest pins (after images are live)
        run: |
          sleep 30
          python auto_pins.py

      - name: Purge Cloudflare cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "CF_ZONE_ID or CF_API_TOKEN not set — skipping cache purge."
            exit 0
          fi
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://nichehubpro.com/articles.js","https://nichehubpro.com/sitemap.xml","https://nichehubpro.com/","https://nichehubpro.com/mental-wellness/","https://nichehubpro.com/productivity/","https://nichehubpro.com/healthy-lifestyle/"]}' \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print('Cache purged OK' if r.get('success') else f'Purge failed: {r}')"
