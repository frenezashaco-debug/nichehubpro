name: Daily Article Publisher

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic json_repair Pillow requests

      - name: Create config.py from secret
        run: echo "ANTHROPIC_API_KEY = \"${{ secrets.ANTHROPIC_API_KEY }}\"" > config.py

      - name: Run batch publisher
        run: python batch_30days.py

      - name: Commit and push
        run: |
          git config user.name "NicheHubPro Bot"
          git config user.email "bot@nichehubpro.com"
          git add articles/ images/ articles.js
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Auto-publish: daily article $(date +'%Y-%m-%d')"
          git push
