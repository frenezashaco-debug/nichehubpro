name: Daily Image Fix

on:
  push:
    branches: [main]
    paths:
      - 'articles/*.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install Pillow requests urllib3

      - name: Create config.py from secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          MAKE_PINTEREST_WEBHOOK: ${{ secrets.MAKE_PINTEREST_WEBHOOK }}
        run: |
          printf 'ANTHROPIC_API_KEY = "%s"\n' "$ANTHROPIC_API_KEY" > config.py
          printf 'HF_API_KEY = "%s"\n' "$HF_API_KEY" >> config.py
          printf 'PINTEREST_ACCESS_TOKEN = "%s"\n' "$PINTEREST_ACCESS_TOKEN" >> config.py
          printf 'MAKE_PINTEREST_WEBHOOK = "%s"\n' "$MAKE_PINTEREST_WEBHOOK" >> config.py
          printf 'OPENAI_API_KEY = ""\n' >> config.py
          python3 -c "import config; print('HF key OK:', bool(config.HF_API_KEY))"

      - run: python auto_fix_covers.py

      - name: Commit and push
        run: |
          git config user.name "NicheHubPro Bot"
          git config user.email "action@github.com"
          git add images/ articles/
          git diff --staged --quiet && echo "Nothing to fix." || (git commit -m "Auto-fix covers: $(date +%Y-%m-%d)" && git pull --rebase origin main && git push origin main)

      - name: Purge Cloudflare cache
        continue-on-error: true
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "CF secrets not set — skipping cache purge."
            exit 0
          fi
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            | python3 -c "import sys,json; r=json.load(sys.stdin); print('Cache purged OK' if r.get('success') else f'Purge failed: {r}')"
