name: Daily Image Fix

on:
  push:
    branches: [main]
    paths:
      - 'articles/*.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pillow requests huggingface_hub

      - name: Write config.py
        run: |
          cat > config.py << 'EOF'
          ANTHROPIC_API_KEY = "${{ secrets.ANTHROPIC_API_KEY }}"
          HF_API_KEY = "${{ secrets.HF_API_KEY }}"
          PINTEREST_ACCESS_TOKEN = "${{ secrets.PINTEREST_ACCESS_TOKEN }}"
          MAKE_PINTEREST_WEBHOOK = "${{ secrets.MAKE_PINTEREST_WEBHOOK }}"
          OPENAI_API_KEY = ""
          EOF


      - run: python auto_fix_covers.py

      - name: Commit and push
        run: |
          git config user.name "NicheHubPro Bot"
          git config user.email "action@github.com"
          git add images/ articles/
          git diff --staged --quiet && echo "Nothing to fix." && exit 0
          git commit -m "Auto-fix covers: $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
