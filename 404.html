<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | NicheHubPro</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://nichehubpro.com/">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
  <script>
    setTimeout(function() { window.location.replace('/'); }, 3000);
  </script>
  <style>
    .not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 40px 20px;
    }
    .not-found h1 { font-size: 5rem; color: #6baf92; margin: 0; }
    .not-found h2 { font-size: 1.5rem; margin: 12px 0 8px; }
    .not-found p  { color: #666; margin-bottom: 24px; }
    .not-found a  {
      background: #6baf92; color: #fff;
      padding: 12px 28px; border-radius: 8px;
      text-decoration: none; font-weight: 600;
    }
    .not-found a:hover { background: #5a9e82; }
  </style>
</head>
<body>
  <div class="not-found">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>This page does not exist. Redirecting you to the homepage in 3 seconds...</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>
</html>
